<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaTech College - Notification System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Login -->

    <div id="loginPage" class="login-page">

        <div class="login-card">

            <h1>NexaTech College</h1>

            <p>Distributed Real-Time Notification System</p>

            <input
                type="text"
                id="username"
                placeholder="Username">

            <select id="role">
                <option value="Student">Student</option>
                <option value="Lecturer">Lecturer</option>
            </select>

            <button onclick="joinChat()">
                Join
            </button>

        </div>

    </div>

    <!-- Main -->

    <div
        id="chatPage"
        class="main-page"
        style="display:none;">

        <header>

            <h2>NexaTech Notification System</h2>

            <div class="header-right">

    <span>
        Server :
        <b id="serverName">Connecting...</b>
    </span>

    <span>
        Online :
        <b id="onlineCount">0</b>
    </span>

    <span>
        Date & Time :
        <b id="currentTime"></b>
    </span>

    <button onclick="logout()">
        Logout
    </button>

</div>

            </div>

        </header>

        <div class="content">

            <!-- Left -->

            <div class="users-panel">

                <h3>Connected Users</h3>

                <ul id="userList"></ul>

            </div>

            <!-- Middle -->

            <div class="chat-panel">

                <h3>Notification Feed</h3>

                <div id="messages" class="messages"></div>

                <div class="message-input">

                    <input
                        type="text"
                        id="responseInput"
                        placeholder="Type your response...">

                    <button onclick="sendMessage('response')">
                        Send
                    </button>

                </div>

            </div>

            <!-- Right -->

            <div
                id="lecturerPanel"
                class="announcement-panel"
                style="display:none;">

                <h3>Announcement</h3>

                <textarea
                    id="announcementInput"
                    placeholder="Enter announcement">
                </textarea>

                <button
                    onclick="sendMessage('announcement')">

                    Send Announcement

                </button>

            </div>

        </div>

    </div>

    <script src="client.js"></script>

</body>

</html>
